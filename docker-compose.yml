services:
  docforge:
    build: .
    container_name: docforge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5051:5051"
    environment:
      # --- Authentication ---
      # Internal key for X-Internal-Key header authentication.
      # Used when DOCFORGE_EXTERNAL_AUTH=true to authenticate Tunnel requests.
      # Internal (Docker network) requests always skip auth regardless of this value.
      DOCFORGE_INTERNAL_KEY: ${DOCFORGE_INTERNAL_KEY:-dev-docforge-key-change-in-production}

      # External authentication toggle (Cloudflare Tunnel requests).
      # "false" (default): all external requests are allowed without auth.
      # "true": external requests must provide X-Internal-Key header.
      DOCFORGE_EXTERNAL_AUTH: "false"

      # --- CORS ---
      # Comma-separated allowed origins. Empty string = allow all origins.
      # exe clients don't send Origin header, so CORS is effectively irrelevant.
      DOCFORGE_ALLOWED_ORIGINS: ""

      # --- OCR (Apple Vision via host) ---
      # The macOS host runs ocr_service.py to expose Apple Vision OCR.
      # Docker calls it via host.docker.internal.
      DOCFORGE_OCR_SERVICE_URL: ${DOCFORGE_OCR_SERVICE_URL:-http://host.docker.internal:5052}

      # --- VLM (Cloud providers for Docker) ---
      # VLM provider selection: "auto" | "openai" | "anthropic"
      # "auto" tries OpenAI first, then Anthropic (local MLX unavailable in Docker).
      DOCFORGE_VLM_PROVIDER: ${DOCFORGE_VLM_PROVIDER:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # --- Async parse-job durable store (Step19 / G21) ---
      # SQLite job store + persisted payloads. Default is an ephemeral /tmp dir
      # (survives worker restart but NOT container recreation). Pin it to the
      # persistent `uploads` volume so queued jobs survive a container rebuild too.
      DOCFORGE_ASYNC_STORE_DIR: ${DOCFORGE_ASYNC_STORE_DIR:-/app/uploads/async_jobs}

      # --- Execution-model split (defects A & B) ---
      # The web process does NOT parse: it only enqueues/polls. A long CPU-bound
      # parse can no longer hold the GIL and starve HTTP ("Server disconnected").
      DOCFORGE_INPROC_WORKER: "0"
      # Backpressure ceiling: when this many jobs are queued, /v1/parse/async
      # returns 503 + Retry-After (code QUEUE_FULL) so the upstream backs off.
      DOCFORGE_QUEUE_MAX: ${DOCFORGE_QUEUE_MAX:-16}
      DOCFORGE_RETRY_AFTER_SEC: ${DOCFORGE_RETRY_AFTER_SEC:-5}
    volumes:
      - uploads:/app/uploads
    networks:
      - kms-aip-shared
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 512M
    healthcheck:
      # Healthcheck runs inside the container (no CF-Connecting-IP header),
      # so it is treated as an internal request and auth is skipped.
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://localhost:5051/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Parse-worker process pool (defects A & B). Same image as `docforge`, but the
  # command is the `docforge-worker` entrypoint instead of gunicorn. It consumes
  # the durable SQLite queue (claim -> parse -> mark) in DOCFORGE_PARSE_WORKERS
  # separate processes, OUTSIDE the web process, so CPU-bound parsing has its own
  # GIL/cores and cannot starve HTTP submit/poll. It MUST share the same durable
  # store directory + volume as the web service. Single-node multi-process is the
  # premise: SQLite WAL + atomic BEGIN IMMEDIATE claim() are safe across multiple
  # processes on one host (horizontal multi-host fan-out is out of scope).
  docforge-worker:
    build: .
    container_name: docforge-worker
    command: ["docforge-worker"]
    depends_on:
      - docforge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Host OCR/VLM access mirrors the web service (parsing calls them).
      DOCFORGE_OCR_SERVICE_URL: ${DOCFORGE_OCR_SERVICE_URL:-http://host.docker.internal:5052}
      DOCFORGE_VLM_PROVIDER: ${DOCFORGE_VLM_PROVIDER:-auto}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # SAME durable store as the web service -- this is how the two processes
      # share the queue. Must match the `docforge` service value exactly.
      DOCFORGE_ASYNC_STORE_DIR: ${DOCFORGE_ASYNC_STORE_DIR:-/app/uploads/async_jobs}
      # Document-level parse concurrency (process count). 0/blank => auto-resolved.
      DOCFORGE_PARSE_WORKERS: ${DOCFORGE_PARSE_WORKERS:-4}
    volumes:
      - uploads:/app/uploads
    networks:
      - kms-aip-shared
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 512M
    restart: unless-stopped

networks:
  kms-aip-shared:
    external: true

volumes:
  uploads:
