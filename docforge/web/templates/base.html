<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DocForge — PDF를 마크다운으로 변환하는 도구" />
  <title>{% block title %}DocForge{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
  {% block head %}{% endblock %}
</head>
<body>
  <header class="app-header" role="banner">
    <a href="{{ url_for('docforge.dashboard') }}" class="app-header__logo" aria-label="DocForge 홈">
      DocForge
    </a>
    <nav class="app-header__nav" aria-label="주요 메뉴">
      <a href="{{ url_for('docforge.dashboard') }}">대시보드</a>
    </nav>
  </header>

  <main class="page-content" id="main-content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
